<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MGOT Adventure Deluxe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#87CEEB;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
font-weight:bold;
text-shadow:2px 2px 4px black;
z-index:100;
line-height:1.5;
}

.mobile{
position:fixed;
bottom:20px;
width:80px;
height:80px;
border:none;
border-radius:50%;
font-size:28px;
background:rgba(255,255,255,0.75);
z-index:100;
}

#leftBtn{ left:20px; }
#rightBtn{ left:120px; }
#jumpBtn{ right:20px; }
</style>
</head>
<body>

<div id="ui"></div>

<button id="leftBtn" class="mobile">◀</button>
<button id="rightBtn" class="mobile">▶</button>
<button id="jumpBtn" class="mobile">⬆</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const GRAVITY = 0.8;

let gameLevel = 1;
let xp = 0;
let level = 1;
let score = 0;
let lives = 3;
let highScore = Number(localStorage.getItem("mgotHighScore") || 0);

let camX = 0;

const player = {
x:100,
y:300,
w:42,
h:48,
vx:0,
vy:0,
speed:6,
jumpPower:16,
grounded:false,
doubleJump:true,
facing:1,
state:"idle"  
};

let left=false;
let right=false;
let jump=false;

const platforms=[];
const coins=[];
const enemies=[];
const hearts=[];
const particles=[];

let finish={
x:3000,
y:450,
w:40,
h:120
};

function resetPlayer(){
player.x=100;
player.y=300;
player.vx=0;
player.vy=0;
player.doubleJump=true;
}

function createParticle(x,y){
particles.push({
x,
y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:40
});
}

function loadLevel(level){

platforms.length=0;
coins.length=0;
enemies.length=0;
hearts.length=0;

if(level===1){

finish.x=3200;

platforms.push(
{x:0,y:600,w:5000,h:200},
{x:350,y:500,w:140,h:20},
{x:650,y:420,w:140,h:20},
{x:950,y:340,w:140,h:20},
{x:1250,y:260,w:140,h:20},
{x:1650,y:500,w:200,h:20},
{x:2050,y:400,w:200,h:20},
{x:2450,y:320,w:200,h:20}
);

coins.push(
{x:390,y:450,c:false},
{x:690,y:370,c:false},
{x:990,y:290,c:false},
{x:1290,y:210,c:false},
{x:1690,y:450,c:false},
{x:2090,y:350,c:false},
{x:2490,y:270,c:false}
);

enemies.push(
{x:1100,y:300,w:40,h:40,dir:1},
{x:2200,y:360,w:40,h:40,dir:-1}
);

hearts.push(
{x:1850,y:450,c:false}
);

}

resetPlayer();

}
    
const mgotLogo = new Image();
mgotLogo.src = "logo.png";
    
loadLevel(1);
document.addEventListener("keydown",e=>{

if(e.key==="a"||e.key==="ArrowLeft"){
left=true;
}

if(e.key==="d"||e.key==="ArrowRight"){
right=true;
}

if(e.code==="Space"){
jump=true;
}

});

document.addEventListener("keyup",e=>{

if(e.key==="a"||e.key==="ArrowLeft"){
left=false;
}

if(e.key==="d"||e.key==="ArrowRight"){
right=false;
}

if(e.code==="Space"){
jump=false;
}

});

function bindButton(id,callback){

const btn=document.getElementById(id);

btn.addEventListener("pointerdown",()=>{
callback(true);
});

btn.addEventListener("pointerup",()=>{
callback(false);
});

btn.addEventListener("pointerleave",()=>{
callback(false);
});

}

bindButton("leftBtn",v=>left=v);
bindButton("rightBtn",v=>right=v);
bindButton("jumpBtn",v=>jump=v);

let jumpPressed=false;

function updatePlayer(){

    // reset horizontálnej rýchlosti
    player.vx = 0;

    // pohyb doľava
    if(left){
        player.vx = -player.speed;
        player.facing = -1;
    }

    // pohyb doprava
    if(right){
        player.vx = player.speed;
        player.facing = 1;
    }

    // skok a double jump
    if(jump && !jumpPressed){

        if(player.grounded){

            player.vy = -player.jumpPower;
            player.grounded = false;

            // efekt pri skoku
            for(let i=0;i<8;i++){
                createParticle(
                    player.x + player.w/2,
                    player.y + player.h
                );
            }

        }else if(player.doubleJump){

            player.vy = -player.jumpPower;
            player.doubleJump = false;

            // efekt pri double jump
            for(let i=0;i<12;i++){
                createParticle(
                    player.x + player.w/2,
                    player.y + player.h
                );
            }

        }

        jumpPressed = true;
    }

    if(!jump){
        jumpPressed = false;
    }

    // gravitácia
    player.vy += GRAVITY;

    // pohyb hráča
    player.x += player.vx;
    player.y += player.vy;

    // reset zeme
    player.grounded = false;

    // kolízie s platformami
    for(const plat of platforms){

        const overlapX =
            player.x < plat.x + plat.w &&
            player.x + player.w > plat.x;

        if(!overlapX) continue;

        const prevBottom =
            player.y + player.h - player.vy;

        const currentBottom =
            player.y + player.h;

        if(
            prevBottom <= plat.y &&
            currentBottom >= plat.y &&
            player.vy >= 0
        ){

            player.y = plat.y - player.h;
            player.vy = 0;
            player.grounded = true;
            player.doubleJump = true;

        }

    }

    // animačné stavy
    if(!player.grounded){

        if(player.vy < 0){
            player.state = "jump";
        }else{
            player.state = "fall";
        }

    }else{

        if(Math.abs(player.vx) > 0){
            player.state = "run";
        }else{
            player.state = "idle";
        }

    }

}
function updateCoins(){

for(const coin of coins){

if(coin.c) continue;

if(
player.x < coin.x+20 &&
player.x+player.w > coin.x-20 &&
player.y < coin.y+20 &&
player.y+player.h > coin.y-20
){

coin.c=true;

score+=10;
xp+=10;

for(let i=0;i<10;i++){
createParticle(
coin.x,
coin.y
);
}

if(xp>=level*100){

level++;

}

}

}

}

function updateHearts(){

for(const heart of hearts){

if(heart.c) continue;

if(
player.x < heart.x+20 &&
player.x+player.w > heart.x-20 &&
player.y < heart.y+20 &&
player.y+player.h > heart.y-20
){

heart.c=true;

if(lives<5){
lives++;
}

}

}

}

function updateEnemies(){

for(const e of enemies){

if(e.dead) continue;

if(!e.start){
e.start=e.x;
}

e.x+=e.dir*2;

if(e.x<e.start-80){
e.dir=1;
}

if(e.x>e.start+80){
e.dir=-1;
}

if(
player.x < e.x+e.w &&
player.x+player.w > e.x &&
player.y < e.y+e.h &&
player.y+player.h > e.y
){

const stomp=
player.vy>0 &&
player.y+player.h<e.y+15;

if(stomp){

e.dead=true;

player.vy=-12;

score+=20;
xp+=20;

for(let i=0;i<20;i++){
createParticle(
e.x+20,
e.y+20
);
}

}else{

lives--;

if(lives<=0){

if(score>highScore){

highScore=score;

localStorage.setItem(
"mgotHighScore",
highScore
);

}

alert("💀 GAME OVER");

location.reload();

}

resetPlayer();

}

}

}

}

function updateParticles(){

for(let i=particles.length-1;i>=0;i--){

const p=particles[i];

p.x+=p.vx;
p.y+=p.vy;

p.life--;

if(p.life<=0){
particles.splice(i,1);
}

}

}  
function drawCloud(x,y){

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.arc(x+25,y-10,30,0,Math.PI*2);
ctx.arc(x+55,y,25,0,Math.PI*2);
ctx.fill();

}

function drawBackground(){

ctx.fillStyle="#87CEEB";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="white";

for(let i=0;i<20;i++){

const cloudX=
(i*350-camX*0.25)%7000;

drawCloud(
cloudX,
80+(i%4)*50
);

}

}

function drawPlatforms(){

ctx.fillStyle="#2e8b57";

for(const p of platforms){

ctx.fillRect(
p.x-camX,
p.y,
p.w,
p.h
);

ctx.fillStyle="#228B22";

ctx.fillRect(
p.x-camX,
p.y,
p.w,
6
);

ctx.fillStyle="#2e8b57";

}

}

function drawCoins(){

const pulse =
Math.sin(Date.now()/150)*2;

for(const coin of coins){

if(coin.c) continue;

const size = 32 + pulse;

ctx.drawImage(
mgotLogo,
coin.x - camX - size/2,
coin.y - size/2,
size,
size
);

}

}
function drawHearts(){

ctx.font="26px Arial";

for(const heart of hearts){

if(heart.c) continue;

ctx.fillText(
"❤️",
heart.x-camX,
heart.y
);

}

}

function drawEnemies(){

ctx.font="34px Arial";

for(const e of enemies){

if(e.dead) continue;

ctx.fillText(
"👾",
e.x-camX,
e.y+32
);

}

}

function drawFinish(){

ctx.fillStyle="white";

ctx.fillRect(
finish.x-camX,
finish.y,
6,
finish.h
);

ctx.fillStyle="red";

ctx.fillRect(
finish.x-camX,
finish.y,
40,
20
);

}

function drawParticles(){

for(const p of particles){

ctx.beginPath();

ctx.arc(
p.x-camX,
p.y,
3,
0,
Math.PI*2
);

ctx.fillStyle="yellow";
ctx.fill();

}

}

function drawPlayer(){

const px=player.x-camX;
const py=player.y;

ctx.save();

ctx.translate(px+21,0);

if(player.facing===-1){
ctx.scale(-1,1);
}

ctx.translate(-(px+21),0);

// čiapka
ctx.fillStyle="#d11";
ctx.fillRect(px+10,py+4,22,8);

ctx.fillStyle="#b00";
ctx.fillRect(px+8,py+10,26,4);

// hlava
ctx.fillStyle="#ffd6a5";

ctx.beginPath();
ctx.arc(px+21,py+18,10,0,Math.PI*2);
ctx.fill();

// oči
ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(px+18,py+17,1.5,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(px+24,py+17,1.5,0,Math.PI*2);
ctx.fill();

// telo
ctx.fillStyle="#00d4ff";
ctx.fillRect(px+12,py+28,18,16);

ctx.fillStyle="white";
ctx.font="bold 10px Arial";
ctx.fillText("M",px+18,py+40);

// nohy
ctx.strokeStyle="#222";
ctx.lineWidth=4;

let leg1=0;
let leg2=0;

if(player.state==="run"){

leg1=Math.sin(Date.now()/100)*6;
leg2=-leg1;

}

if(player.state==="jump"){

leg1=-5;
leg2=-5;

}

if(player.state==="fall"){

leg1=5;
leg2=5;

}

ctx.beginPath();
ctx.moveTo(px+16,py+44);
ctx.lineTo(px+16,py+56+leg1);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(px+26,py+44);
ctx.lineTo(px+26,py+56+leg2);
ctx.stroke();

ctx.restore();

}


function updateUI(){

ui.innerHTML=
"🪙 Coins: "+score+
"<br>⭐ XP: "+xp+
"<br>🏆 Level: "+level+
"<br>🌍 Stage: "+gameLevel+
"<br>❤️ Lives: "+lives+
"<br>🥇 Best: "+highScore;

}

function render(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawBackground();

drawPlatforms();

drawCoins();

drawHearts();

drawEnemies();

drawFinish();

drawParticles();

drawPlayer();

updateUI();

}  
function nextStage(){

gameLevel++;

if(gameLevel>5){

if(score>highScore){

highScore=score;

localStorage.setItem(
"mgotHighScore",
highScore
);

}

alert(
"🏆 CONGRATULATIONS!\n\n"+
"You finished MGOT Adventure Deluxe!\n\n"+
"Score: "+score+
"\nXP: "+xp+
"\nLevel: "+level
);

location.reload();

return;

}

loadStage(gameLevel);

}

function loadStage(stage){

platforms.length=0;
coins.length=0;
enemies.length=0;
hearts.length=0;

resetPlayer();

if(stage===1){

finish.x=3200;

platforms.push(
{x:0,y:600,w:5000,h:200},
{x:350,y:500,w:150,h:20},
{x:700,y:420,w:150,h:20},
{x:1050,y:340,w:150,h:20},
{x:1400,y:260,w:150,h:20}
);

coins.push(
{x:390,y:450,c:false},
{x:740,y:370,c:false},
{x:1090,y:290,c:false},
{x:1440,y:210,c:false}
);

enemies.push(
{x:900,y:560,w:40,h:40,dir:1}
);

}

else if(stage===2){

finish.x=2600;

platforms.push(

{x:2000,y:430,w:120,h:20}
);

coins.push(
{x:530,y:470,c:false},
{x:830,y:380,c:false},
{x:1130,y:290,c:false},
{x:1430,y:200,c:false},
{x:1730,y:290,c:false}
);

{x:1200,y:300,w:40,h:40,dir:1},
{x:1900,y:390,w:40,h:40,dir:-1}
);

}

else if(stage===3){

platforms.push(
{x:0,y:600,w:5000,h:200},
{x:450,y:520,w:180,h:20},
{x:900,y:450,w:180,h:20},
{x:1350,y:380,w:180,h:20},
{x:1800,y:310,w:180,h:20},
{x:2250,y:240,w:180,h:20}
);

coins.push(
{x:500,y:470,c:false},
{x:950,y:400,c:false},
{x:1400,y:330,c:false},
{x:1850,y:260,c:false},
{x:2300,y:190,c:false}
);

enemies.push(
{x:1000,y:410,w:40,h:40,dir:1},
{x:1900,y:270,w:40,h:40,dir:-1}
);

hearts.push(
{x:2100,y:200,c:false}
);

}

else if(stage===4){

finish.x=3400;

platforms.push(
{x:0,y:600,w:5000,h:200},
{x:400,y:500,w:120,h:20},
{x:700,y:420,w:120,h:20},
{x:1000,y:340,w:120,h:20},
{x:1300,y:260,w:120,h:20},
{x:1600,y:180,w:120,h:20},
{x:1900,y:260,w:120,h:20},
{x:2200,y:340,w:120,h:20},
{x:2500,y:420,w:120,h:20}
);

coins.push(
{x:430,y:450,c:false},
{x:730,y:370,c:false},
{x:1030,y:290,c:false},
{x:1330,y:210,c:false},
{x:1630,y:130,c:false}
);

enemies.push(
{x:1500,y:140,w:40,h:40,dir:1},
{x:2300,y:300,w:40,h:40,dir:-1}
);

}

else if(stage===5){

finish.x=4200;

platforms.push(
{x:0,y:600,w:6000,h:200},
{x:600,y:500,w:200,h:20},
{x:1100,y:420,w:200,h:20},
{x:1600,y:340,w:200,h:20},
{x:2100,y:260,w:200,h:20},
{x:2600,y:180,w:200,h:20},
{x:3200,y:260,w:200,h:20},
{x:3700,y:340,w:200,h:20}
);

coins.push(
{x:650,y:450,c:false},

{x:1650,y:290,c:false},

{x:3250,y:210,c:false}
);

enemies.push(
{x:1800,y:300,w:40,h:40,dir:1},

);

}

loadStage(1);

function checkFinish(){
if(gameLevel===5){
return;
}
if(
player.x < finish.x+finish.w &&
player.x+player.w > finish.x &&
player.y < finish.y+finish.h &&
player.y+player.h > finish.y
){

nextStage();

}

}  
// =======================
// BOSS SYSTEM
// =======================

let boss={
active:false,
dead:false,
x:3900,
y:520,
w:90,
h:90,
hp:10
};

function updateBoss(){

if(gameLevel!==5) return;

if(gameLevel===5 && !boss.dead){
boss.active=true;
}
    
if(!boss.active) return;

if(
player.x < boss.x+boss.w &&
player.x+player.w > boss.x &&
player.y < boss.y+boss.h &&
player.y+player.h > boss.y
){

const stomp=
player.vy>0 &&
player.y+player.h<boss.y+25;

if(stomp){

boss.hp--;

player.vy=-14;

for(let i=0;i<30;i++){
createParticle(
boss.x+40,
boss.y+40
);
}

if(boss.hp<=0){

boss.active=false;
boss.dead=true;

score+=500;

// koniec hry
if(score > highScore){

highScore = score;

localStorage.setItem(
"mgotHighScore",
highScore
);

}

alert(
"🏆 CONGRATULATIONS!\n\n"+
"You defeated the MGOT Boss!\n\n"+
"Score: "+score+
"\nXP: "+xp+
"\nLevel: "+level
);

location.reload();

}
}else{

lives--;

resetPlayer();

if(lives<=0){

alert("GAME OVER");

location.reload();

}

}

}

}

function drawBoss(){

if(gameLevel!==5) return;

if(!boss.active) return;

if(boss.dead) return;

ctx.font="72px Arial";

ctx.fillText(
"👹",
boss.x-camX,
boss.y+60
);

ctx.fillStyle="red";
ctx.fillRect(
boss.x-camX,
boss.y-25,
100,
10
);

ctx.fillStyle="lime";
ctx.fillRect(
boss.x-camX,
boss.y-25,
boss.hp*10,
10
);
    
}

// =======================
// SPECIAL BACKGROUNDS
// =======================

function drawStageEffects(){

if(gameLevel===2){

ctx.fillStyle="rgba(255,120,0,0.15)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

if(gameLevel===3){

ctx.fillStyle="rgba(0,255,120,0.12)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

if(gameLevel===4){

ctx.fillStyle="rgba(180,220,255,0.18)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

if(gameLevel===5){

ctx.fillStyle="rgba(60,60,60,0.25)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}

}

// =======================
// CAMERA
// =======================

function updateCamera(){

camX=
player.x-
canvas.width*0.35;

if(camX<0){
camX=0;
}

}

// =======================
// FALL DAMAGE
// =======================

function checkDeath(){

if(
player.y>
canvas.height+500
){

lives--;

if(lives<=0){

alert(
"💀 GAME OVER"
);

location.reload();

}

resetPlayer();

}

}

// =======================
// MASTER UPDATE
// =======================

function updateGame(){

updatePlayer();

updateCoins();

updateHearts();

updateEnemies();

updateBoss();

updateParticles();

updateCamera();

checkFinish();

checkDeath();

}

// =======================
// MASTER RENDER
// =======================

function renderGame(){

render();

drawStageEffects();

drawBoss();

}

// =======================
// GAME LOOP
// =======================

function loop(){

updateGame();

renderGame();

requestAnimationFrame(
loop
);

}

loop();

</script>
</body>
</html>
