<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MGOT Mario Mobile</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#6ec6ff;
    touch-action:none;
    font-family:Arial;
}

canvas{ display:block; }

/* HUD */
#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-size:16px;
    z-index:10;
}

/* CONTROLS */
#controls{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 30px;
    z-index:20;
}

.btn{
    width:85px;
    height:85px;
    border-radius:50%;
    border:none;
    font-size:28px;
    background:rgba(0,0,0,0.4);
    color:white;
}
</style>
</head>
<body>

<div id="ui"></div>

<div id="controls">
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="jump">⤒</button>
    <button class="btn" id="right">➡️</button>
</div>

<canvas id="game"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const ui = document.getElementById("ui");

const GRAVITY = 0.8;

// CAMERA
let camX = 0;

// PLAYER
const p = {
    x:100,y:200,w:40,h:50,
    vx:0,vy:0,
    speed:6,
    jump:15,
    grounded:false
};

// LEVEL (Mario štýl)
const level = {
    groundY: 500,
    platforms:[
        {x:0,y:500,w:5000,h:200},
        {x:300,y:380,w:150,h:20},
        {x:600,y:320,w:150,h:20},
        {x:900,y:260,w:150,h:20},
        {x:1200,y:220,w:150,h:20},
        {x:1600,y:260,w:150,h:20},
        {x:2000,y:320,w:150,h:20}
    ],
    coins:[
        {x:350,y:340,c:false},
        {x:650,y:280,c:false},
        {x:950,y:220,c:false},
        {x:1250,y:180,c:false},
        {x:1650,y:220,c:false}
    ],
    enemies:[
        {x:700,y:460,w:40,h:40,vx:2},
        {x:1400,y:460,w:40,h:40,vx:-2}
    ],
    goal:{x:2600,y:420,w:60,h:80}
};

let score = 0;
let lives = 3;

// INPUT (100% mobile stable)
let left=false,right=false,jump=false;

function bind(id, type){
    const el=document.getElementById(id);

    el.addEventListener("pointerdown", e=>{
        e.preventDefault();
        if(type==="left") left=true;
        if(type==="right") right=true;
        if(type==="jump") jump=true;
    });

    el.addEventListener("pointerup", ()=>{
        left=false; right=false; jump=false;
    });

    el.addEventListener("pointercancel", ()=>{
        left=false; right=false; jump=false;
    });
}

bind("left","left");
bind("right","right");
bind("jump","jump");

// keyboard fallback
document.addEventListener("keydown",e=>{
    if(e.key==="a") left=true;
    if(e.key==="d") right=true;
    if(e.key===" ") jump=true;
});
document.addEventListener("keyup",e=>{
    if(e.key==="a") left=false;
    if(e.key==="d") right=false;
    if(e.key===" ") jump=false;
});

function respawn(){
    p.x=100;
    p.y=200;
    p.vx=0;
    p.vy=0;
    lives--;
}

function update(){

    // movement
    p.vx = 0;
    if(left) p.vx = -p.speed;
    if(right) p.vx = p.speed;

    // jump
    if(jump && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
    }

    // physics
    p.vy += GRAVITY;

    p.x += p.vx;
    p.y += p.vy;

    p.grounded = false;

    // collision platforms
    for(let plat of level.platforms){
        if(
            p.x < plat.x+plat.w &&
            p.x+p.w > plat.x &&
            p.y+p.h <= plat.y &&
            p.y+p.h+p.vy >= plat.y
        ){
            p.y = plat.y - p.h;
            p.vy = 0;
            p.grounded = true;
        }
    }

    // coins
    for(let c of level.coins){
        if(!c.c &&
            p.x < c.x+20 &&
            p.x+p.w > c.x &&
            p.y < c.y+20 &&
            p.y+p.h > c.y
        ){
            c.c = true;
            score++;
        }
    }

    // enemies
    for(let e of level.enemies){
        e.x += e.vx;
        if(e.x < 0 || e.x > 3000) e.vx *= -1;

        if(
            p.x < e.x+e.w &&
            p.x+p.w > e.x &&
            p.y < e.y+e.h &&
            p.y+p.h > e.y
        ){
            respawn();
        }
    }

    // goal
    let g = level.goal;
    if(
        p.x < g.x+g.w &&
        p.x+p.w > g.x &&
        p.y < g.y+g.h &&
        p.y+p.h > g.y
    ){
        alert("YOU WIN MGOT WORLD!");
        location.reload();
    }

    camX = p.x - 200;

    if(p.y > 1000) respawn();
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // sky gradient
    let grd = ctx.createLinearGradient(0,0,0,c.height);
    grd.addColorStop(0,"#6ec6ff");
    grd.addColorStop(1,"#1e90ff");
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,c.width,c.height);

    // platforms
    ctx.fillStyle="#2e8b57";
    for(let plat of level.platforms){
        ctx.fillRect(plat.x-camX,plat.y,plat.w,plat.h);
    }

    // coins
    ctx.fillStyle="gold";
    for(let c of level.coins){
        if(!c.c){
            ctx.beginPath();
            ctx.arc(c.x-camX,c.y,10,0,Math.PI*2);
            ctx.fill();
        }
    }

    // enemies
    ctx.fillStyle="purple";
    for(let e of level.enemies){
        ctx.fillRect(e.x-camX,e.y,e.w,e.h);
    }

    // goal
    ctx.fillStyle="lime";
    ctx.fillRect(level.goal.x-camX,level.goal.y,level.goal.w,level.goal.h);

    // player (Mario style placeholder)
    ctx.fillStyle="red";
    ctx.fillRect(p.x-camX,p.y,p.w,p.h);

    ui.innerHTML = `MGOT: ${score} | Lives: ${lives}`;
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
