<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MGOT Mobile FIX</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#87CEEB;
    touch-action:none;
    font-family:Arial;
}

canvas {
    display:block;
}

/* CONTROLS */
#controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-around;
    z-index:10;
}

.btn {
    width:85px;
    height:85px;
    border-radius:50%;
    border:none;
    font-size:28px;
    background:rgba(0,0,0,0.4);
    color:white;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="controls">
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="jump">⤒</button>
    <button class="btn" id="right">➡️</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const GRAVITY = 0.8;

// PLAYER
const p = {
    x:100,
    y:100,
    w:40,
    h:50,
    vx:0,
    vy:0,
    speed:6,
    jump:15,
    grounded:false
};

// FIX ground (stabilný)
let groundY = 0;

function updateGround(){
    groundY = c.height - 120;
}

// INPUT (pointer events = 100% mobile kompatibilita)
let left = false;
let right = false;
let jump = false;

function bind(btn, action){
    const el = document.getElementById(btn);

    el.addEventListener("pointerdown", e=>{
        e.preventDefault();
        if(action==="left") left=true;
        if(action==="right") right=true;
        if(action==="jump") jump=true;
    });

    el.addEventListener("pointerup", e=>{
        e.preventDefault();
        if(action==="left") left=false;
        if(action==="right") right=false;
        if(action==="jump") jump=false;
    });

    el.addEventListener("pointercancel", ()=>{
        left=false; right=false; jump=false;
    });
}

bind("left","left");
bind("right","right");
bind("jump","jump");

// KEYBOARD fallback
document.addEventListener("keydown", e=>{
    if(e.key==="a") left=true;
    if(e.key==="d") right=true;
    if(e.key===" ") jump=true;
});
document.addEventListener("keyup", e=>{
    if(e.key==="a") left=false;
    if(e.key==="d") right=false;
    if(e.key===" ") jump=false;
});

function update(){

    updateGround();

    // movement
    p.vx = 0;

    if(left) p.vx = -p.speed;
    if(right) p.vx = p.speed;

    // jump (len ak stojí)
    if(jump && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
    }

    // physics
    p.vy += GRAVITY;

    p.x += p.vx;
    p.y += p.vy;

    // ground collision (100% stable)
    if(p.y + p.h >= groundY){
        p.y = groundY - p.h;
        p.vy = 0;
        p.grounded = true;
    }
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // sky
    ctx.fillStyle="#87CEEB";
    ctx.fillRect(0,0,c.width,c.height);

    // ground
    ctx.fillStyle="green";
    ctx.fillRect(0,groundY,c.width,120);

    // player
    ctx.fillStyle="red";
    ctx.fillRect(p.x,p.y,p.w,p.h);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
