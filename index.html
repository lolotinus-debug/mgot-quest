<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>MGOT Survivor Mobile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
width:100vw;
height:100vh;
background:#181818;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
z-index:100;
font-size:18px;
}

#joystick{
position:fixed;
left:30px;
bottom:30px;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,.15);
z-index:100;
}

#stick{
position:absolute;
left:40px;
top:40px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,.6);
}

#fireBtn{
position:fixed;
right:40px;
bottom:50px;
width:120px;
height:120px;
border-radius:50%;
border:none;
background:#ff4444;
color:white;
font-size:24px;
font-weight:bold;
z-index:100;
}

</style>
</head>
<body>

<div id="hud">
HP: <span id="hp">100</span>
<br>
Score: <span id="score">0</span>
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="fireBtn">
FIRE
</button>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();
addEventListener("resize",resize);

const player={
x:0,
y:0,
size:25,
speed:5,
hp:100
};

const camera={
x:0,
y:0
};
const bullets=[];

const weapon={
damage:20,
fireRate:200,
bulletSpeed:12
};

let canShoot=true;
let autoFire=false;
  
const joystick=document.getElementById("joystick");
const fireBtn=document.getElementById("fireBtn");

fireBtn.addEventListener("touchstart",()=>{
autoFire=true;
});

fireBtn.addEventListener("touchend",()=>{
autoFire=false;
});
const stick=document.getElementById("stick");

let moveX=0;
let moveY=0;

let dragging=false;

joystick.addEventListener("touchstart",e=>{
dragging=true;
});

joystick.addEventListener("touchmove",e=>{

if(!dragging)return;

const touch=e.touches[0];

const rect=joystick.getBoundingClientRect();

const cx=rect.width/2;
const cy=rect.height/2;

let dx=touch.clientX-rect.left-cx;
let dy=touch.clientY-rect.top-cy;

const dist=Math.hypot(dx,dy);

const max=40;

if(dist>max){

dx=(dx/dist)*max;
dy=(dy/dist)*max;

}

stick.style.left=(dx+40)+"px";
stick.style.top=(dy+40)+"px";

moveX=dx/max;
moveY=dy/max;

});

joystick.addEventListener("touchend",()=>{

dragging=false;

moveX=0;
moveY=0;

stick.style.left="40px";
stick.style.top="40px";

});
function shoot(){

if(!canShoot) return;

canShoot=false;

setTimeout(()=>{
canShoot=true;
},weapon.fireRate);

bullets.push({

x:player.x,
y:player.y,

vx:weapon.bulletSpeed,
vy:0,

life:80

});

}
function updateBullets(){

for(let i=bullets.length-1;i>=0;i--){

const b=bullets[i];

b.x+=b.vx;
b.y+=b.vy;

b.life--;

if(b.life<=0){

bullets.splice(i,1);

}

}

}

function drawBullets(){

ctx.fillStyle="yellow";

for(const b of bullets){

ctx.beginPath();

ctx.arc(

b.x-camera.x+canvas.width/2,
b.y-camera.y+canvas.height/2,

6,
0,
Math.PI*2

);

ctx.fill();

}

}
function updateWeapon(){

if(autoFire){

shoot();

}

}  
function updatePlayer(){

player.x+=moveX*player.speed;
player.y+=moveY*player.speed;

camera.x=player.x;
camera.y=player.y;

document.getElementById("hp").textContent=
Math.floor(player.hp);

}

function drawGrid(){

ctx.strokeStyle="#222";

for(let x=-5000;x<5000;x+=100){

ctx.beginPath();

ctx.moveTo(
x-camera.x+canvas.width/2,
0
);

ctx.lineTo(
x-camera.x+canvas.width/2,
canvas.height
);

ctx.stroke();

}

for(let y=-5000;y<5000;y+=100){

ctx.beginPath();

ctx.moveTo(
0,
y-camera.y+canvas.height/2
);

ctx.lineTo(
canvas.width,
y-camera.y+canvas.height/2
);

ctx.stroke();

}

}

function drawPlayer(){

ctx.fillStyle="#00ff88";

ctx.beginPath();

ctx.arc(
canvas.width/2,
canvas.height/2,
player.size,
0,
Math.PI*2
);

ctx.fill();

}

function gameLoop(){

updatePlayer();

updateWeapon();

updateBullets();

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawGrid();

drawBullets();

drawPlayer();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>
</body>
</html>
