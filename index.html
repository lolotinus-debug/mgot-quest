<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>MGOT FPS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

#game{
display:block;
width:100vw;
height:100vh;
background:#111;
cursor:none;
}

#hud{
position:fixed;
top:15px;
left:15px;
color:white;
font-size:18px;
z-index:100;
text-shadow:2px 2px 4px black;
}

#crosshair{
position:fixed;
left:50%;
top:50%;
width:20px;
height:20px;
margin-left:-10px;
margin-top:-10px;
pointer-events:none;
z-index:100;
}

#crosshair:before{
content:"";
position:absolute;
left:9px;
top:0;
width:2px;
height:20px;
background:white;
}

#crosshair:after{
content:"";
position:absolute;
left:0;
top:9px;
width:20px;
height:2px;
background:white;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
color:white;
z-index:500;
}

#startBtn{
padding:15px 30px;
font-size:20px;
cursor:pointer;
border:none;
border-radius:10px;
background:#00ff88;
font-weight:bold;
}

</style>
</head>

<body>

<div id="hud">
<div>HP: <span id="hp">100</span></div>
<div>Score: <span id="score">0</span></div>
<div>Ammo: <span id="ammo">30</span></div>
</div>

<div id="crosshair"></div>

<div id="startScreen">
<h1>MGOT FPS</h1>
<br>
<button id="startBtn">
START GAME
</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

const hpEl=document.getElementById("hp");
const scoreEl=document.getElementById("score");
const ammoEl=document.getElementById("ammo");

let gameStarted=false;

const player={

x:0,
y:0,

angle:0,

speed:6,

hp:100,

score:0,

ammo:30

};

const keys={};

window.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()]=true;

});

window.addEventListener("keyup",e=>{

keys[e.key.toLowerCase()]=false;

});

document.getElementById("startBtn")
.addEventListener("click",()=>{

document.getElementById("startScreen")
.style.display="none";

canvas.requestPointerLock();

gameStarted=true;

});

let mouseX=0;
let mouseY=0;

document.addEventListener("mousemove",e=>{

mouseX=e.clientX;
mouseY=e.clientY;

});

function updatePlayer(){

if(keys["w"]){
player.y-=player.speed;
}

if(keys["s"]){
player.y+=player.speed;
}

if(keys["a"]){
player.x-=player.speed;
}

if(keys["d"]){
player.x+=player.speed;
}

}

function drawFloor(){

ctx.fillStyle="#1a1a1a";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

const size=80;

ctx.strokeStyle="#222";

for(let x=0;x<canvas.width;x+=size){

ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();

}

for(let y=0;y<canvas.height;y+=size){

ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();

}

}

function drawPlayerMarker(){

ctx.fillStyle="#00ff88";

ctx.beginPath();

ctx.arc(
canvas.width/2,
canvas.height/2,
15,
0,
Math.PI*2
);

ctx.fill();

}

function updateHUD(){

hpEl.textContent=player.hp;
scoreEl.textContent=player.score;
ammoEl.textContent=player.ammo;

}

function gameLoop(){

if(gameStarted){

updatePlayer();

}

drawFloor();

drawPlayerMarker();

updateHUD();

requestAnimationFrame(gameLoop);

}

gameLoop();
// ============================
// WEAPONS
// ============================

const bullets=[];

let canShoot=true;

const weapon={

damage:25,

fireRate:150,

bulletSpeed:18,

maxAmmo:30

};

// ============================
// CAMERA
// ============================

document.addEventListener("mousemove",(e)=>{

if(document.pointerLockElement===canvas){

player.angle+=e.movementX*0.003;

}

});

// ============================
// SHOOTING
// ============================

document.addEventListener("mousedown",(e)=>{

if(e.button===0){

shoot();

}

});

function shoot(){

if(!gameStarted) return;

if(!canShoot) return;

if(player.ammo<=0) return;

player.ammo--;

canShoot=false;

setTimeout(()=>{

canShoot=true;

},weapon.fireRate);

bullets.push({

x:player.x,

y:player.y,

vx:Math.cos(player.angle)*weapon.bulletSpeed,

vy:Math.sin(player.angle)*weapon.bulletSpeed,

life:100

});

createMuzzleFlash();

}

// ============================
// BULLET UPDATE
// ============================

function updateBullets(){

for(let i=bullets.length-1;i>=0;i--){

const b=bullets[i];

b.x+=b.vx;
b.y+=b.vy;

b.life--;

if(b.life<=0){

bullets.splice(i,1);

}

}

}

// ============================
// BULLET DRAW
// ============================

function drawBullets(){

ctx.fillStyle="yellow";

for(const b of bullets){

const sx=
canvas.width/2+(b.x-player.x);

const sy=
canvas.height/2+(b.y-player.y);

ctx.beginPath();

ctx.arc(
sx,
sy,
4,
0,
Math.PI*2
);

ctx.fill();

}

}

// ============================
// MUZZLE FLASH
// ============================

let flashTimer=0;

function createMuzzleFlash(){

flashTimer=3;

}

function drawMuzzleFlash(){

if(flashTimer<=0) return;

flashTimer--;

ctx.fillStyle="rgba(255,200,50,0.8)";

ctx.beginPath();

ctx.arc(

canvas.width/2+25,
canvas.height/2,

20+Math.random()*20,

0,
Math.PI*2

);

ctx.fill();

}

// ============================
// RELOAD
// ============================

document.addEventListener("keydown",(e)=>{

if(e.key.toLowerCase()==="r"){

reloadWeapon();

}

});

function reloadWeapon(){

player.ammo=weapon.maxAmmo;

}

// ============================
// CROSSHAIR SPREAD
// ============================

let recoil=0;

function addRecoil(){

recoil=10;

}

function updateRecoil(){

recoil*=0.90;

}

// ============================
// IMPROVED PLAYER DRAW
// ============================

function drawDirection(){

ctx.strokeStyle="#00ff88";

ctx.lineWidth=4;

ctx.beginPath();

ctx.moveTo(
canvas.width/2,
canvas.height/2
);

ctx.lineTo(

canvas.width/2+
Math.cos(player.angle)*40,

canvas.height/2+
Math.sin(player.angle)*40

);

ctx.stroke();

}

// ============================
// MINIMAP
// ============================

function drawMiniMap(){

ctx.fillStyle="rgba(0,0,0,0.5)";

ctx.fillRect(
canvas.width-210,
10,
200,
200
);

ctx.fillStyle="#00ff88";

ctx.beginPath();

ctx.arc(
canvas.width-110,
110,
6,
0,
Math.PI*2
);

ctx.fill();

}

// ============================
// REPLACE GAME LOOP CONTENT
// ============================

const oldGameLoop=gameLoop;

gameLoop=function(){

if(gameStarted){

updatePlayer();

updateBullets();

updateRecoil();

}

drawFloor();

drawBullets();

drawPlayerMarker();

drawDirection();

drawMiniMap();

drawMuzzleFlash();

updateHUD();

requestAnimationFrame(gameLoop);

};

gameLoop();
// ============================
// ENEMIES
// ============================

const enemies=[];

const enemyTypes=[

{
name:"Scout",
hp:50,
speed:1.8,
size:18,
reward:10
},

{
name:"Soldier",
hp:100,
speed:1.2,
size:24,
reward:20
},

{
name:"Tank",
hp:200,
speed:0.7,
size:32,
reward:50
}

];

// ============================
// PLAYER XP
// ============================

let xp=0;
let level=1;
let coins=0;

const xpPerLevel=100;

// ============================
// SPAWN ENEMY
// ============================

function spawnEnemy(){

const type=
enemyTypes[
Math.floor(
Math.random()*enemyTypes.length
)
];

const angle=
Math.random()*Math.PI*2;

const distance=
600+Math.random()*800;

enemies.push({

type:type.name,

hp:type.hp,

maxHp:type.hp,

speed:type.speed,

size:type.size,

reward:type.reward,

x:
player.x+
Math.cos(angle)*distance,

y:
player.y+
Math.sin(angle)*distance

});

}

// ============================
// AUTO SPAWN
// ============================

setInterval(()=>{

if(gameStarted){

if(enemies.length<25){

spawnEnemy();

}

}

},1000);

// ============================
// UPDATE ENEMIES
// ============================

function updateEnemies(){

for(let e of enemies){

const dx=player.x-e.x;
const dy=player.y-e.y;

const dist=Math.hypot(dx,dy);

if(dist>0){

e.x+=(dx/dist)*e.speed;
e.y+=(dy/dist)*e.speed;

}

if(dist<30){

player.hp-=0.1;

if(player.hp<0){

player.hp=0;

}

}

}

}

// ============================
// DRAW ENEMIES
// ============================

function drawEnemies(){

for(let e of enemies){

const sx=
canvas.width/2+(e.x-player.x);

const sy=
canvas.height/2+(e.y-player.y);

ctx.fillStyle="red";

ctx.beginPath();

ctx.arc(
sx,
sy,
e.size,
0,
Math.PI*2
);

ctx.fill();

const hpWidth=50;

ctx.fillStyle="black";

ctx.fillRect(
sx-hpWidth/2,
sy-e.size-20,
hpWidth,
8
);

ctx.fillStyle="lime";

ctx.fillRect(
sx-hpWidth/2,
sy-e.size-20,
hpWidth*(e.hp/e.maxHp),
8
);

}

}

// ============================
// BULLET COLLISION
// ============================

function bulletCollision(){

for(let i=bullets.length-1;i>=0;i--){

const b=bullets[i];

for(let j=enemies.length-1;j>=0;j--){

const e=enemies[j];

const dist=Math.hypot(

b.x-e.x,
b.y-e.y

);

if(dist<e.size){

e.hp-=weapon.damage;

bullets.splice(i,1);

if(e.hp<=0){

killEnemy(j,e);

}

break;

}

}

}

}

// ============================
// KILL ENEMY
// ============================

function killEnemy(index,e){

player.score++;

coins+=e.reward;

xp+=e.reward;

enemies.splice(index,1);

checkLevelUp();

createKillEffect();

}

// ============================
// LEVEL SYSTEM
// ============================

function checkLevelUp(){

const required=
level*xpPerLevel;

if(xp>=required){

level++;

player.hp=100;

}

}

// ============================
// KILL EFFECT
// ============================

const particles=[];

function createKillEffect(){

for(let i=0;i<20;i++){

particles.push({

x:canvas.width/2,
y:canvas.height/2,

vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,

life:40

});

}

}

function updateParticles(){

for(let i=particles.length-1;i>=0;i--){

const p=particles[i];

p.x+=p.vx;
p.y+=p.vy;

p.life--;

if(p.life<=0){

particles.splice(i,1);

}

}

}

function drawParticles(){

ctx.fillStyle="orange";

for(const p of particles){

ctx.fillRect(
p.x,
p.y,
4,
4
);

}

}

// ============================
// XP HUD
// ============================

const xpBox=document.createElement("div");

xpBox.style.position="fixed";
xpBox.style.left="15px";
xpBox.style.top="90px";
xpBox.style.color="white";
xpBox.style.zIndex="999";

document.body.appendChild(xpBox);

function updateXPHud(){

xpBox.innerHTML=
`
Level: ${level}<br>
XP: ${xp}<br>
Coins: ${coins}
`;

}

// ============================
// GAME OVER
// ============================

function gameOver(){

ctx.fillStyle="rgba(0,0,0,0.8)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="white";

ctx.font="60px Arial";

ctx.fillText(
"GAME OVER",
canvas.width/2-180,
canvas.height/2
);

}

// ============================
// PATCH GAME LOOP
// ============================

const previousGameLoop=gameLoop;

gameLoop=function(){

if(gameStarted){

updatePlayer();

updateBullets();

updateEnemies();

bulletCollision();

updateParticles();

updateRecoil();

}

drawFloor();

drawBullets();

drawEnemies();

drawParticles();

drawPlayerMarker();

drawDirection();

drawMiniMap();

drawMuzzleFlash();

updateHUD();

updateXPHud();

if(player.hp<=0){

gameOver();

return;

}

requestAnimationFrame(gameLoop);

};

gameLoop();
// ============================
// WAVE SYSTEM
// ============================

let wave=1;
let enemiesKilledThisWave=0;
let enemiesNeededForWave=10;

const waveBox=document.createElement("div");

waveBox.style.position="fixed";
waveBox.style.top="170px";
waveBox.style.left="15px";
waveBox.style.color="white";
waveBox.style.fontSize="18px";
waveBox.style.zIndex="999";

document.body.appendChild(waveBox);

function updateWaveHUD(){

waveBox.innerHTML=`
Wave: ${wave}<br>
Kills: ${enemiesKilledThisWave}/${enemiesNeededForWave}
`;

}

function nextWave(){

wave++;

enemiesKilledThisWave=0;

enemiesNeededForWave+=5;

for(let i=0;i<wave+5;i++){

spawnEnemy();

}

}

// ============================
// COIN DROPS
// ============================

const coinDrops=[];

function dropCoin(x,y,amount){

coinDrops.push({

x,
y,

amount,

size:12,

rotation:0

});

}

function updateCoins(){

for(let c of coinDrops){

c.rotation+=0.1;

}

}

function drawCoins(){

for(let c of coinDrops){

const sx=
canvas.width/2+(c.x-player.x);

const sy=
canvas.height/2+(c.y-player.y);

ctx.save();

ctx.translate(sx,sy);

ctx.rotate(c.rotation);

ctx.fillStyle="gold";

ctx.fillRect(-8,-8,16,16);

ctx.restore();

}

}

function collectCoins(){

for(let i=coinDrops.length-1;i>=0;i--){

const c=coinDrops[i];

const dist=Math.hypot(

player.x-c.x,
player.y-c.y

);

if(dist<40){

coins+=c.amount;

coinDrops.splice(i,1);

}

}

}

// ============================
// SHOP
// ============================

let damageLevel=1;
let fireRateLevel=1;
let hpLevel=1;

const shop=document.createElement("div");

shop.style.position="fixed";
shop.style.right="20px";
shop.style.top="20px";
shop.style.background="rgba(0,0,0,0.7)";
shop.style.padding="15px";
shop.style.color="white";
shop.style.zIndex="999";
shop.style.display="none";

document.body.appendChild(shop);

function updateShop(){

shop.innerHTML=`

<h3>MGOT SHOP</h3>

Coins: ${coins}

<br><br>

<button onclick="buyDamage()">
Damage Upgrade
</button>

<br><br>

<button onclick="buyFireRate()">
Fire Rate Upgrade
</button>

<br><br>

<button onclick="buyHP()">
HP Upgrade
</button>

`;

}

window.buyDamage=function(){

if(coins<100) return;

coins-=100;

damageLevel++;

weapon.damage+=10;

};

window.buyFireRate=function(){

if(coins<150) return;

coins-=150;

fireRateLevel++;

weapon.fireRate=Math.max(
40,
weapon.fireRate-10
);

};

window.buyHP=function(){

if(coins<120) return;

coins-=120;

hpLevel++;

player.hp+=25;

};

document.addEventListener("keydown",(e)=>{

if(e.key==="Tab"){

e.preventDefault();

shop.style.display=
shop.style.display==="none"
?
"block"
:
"none";

updateShop();

}

});

// ============================
// ACHIEVEMENTS
// ============================

const achievements=[];

function unlockAchievement(name){

if(
achievements.includes(name)
) return;

achievements.push(name);

showAchievement(name);

}

function showAchievement(text){

const div=document.createElement("div");

div.style.position="fixed";
div.style.top="50%";
div.style.left="50%";
div.style.transform=
"translate(-50%,-50%)";

div.style.background="gold";
div.style.color="black";
div.style.padding="20px";
div.style.fontWeight="bold";
div.style.zIndex="5000";

div.innerText=
"Achievement Unlocked: "+text;

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},3000);

}

// ============================
// BOSSES
// ============================

function spawnBoss(){

enemies.push({

type:"MGOT BOSS",

hp:1000+(wave*100),

maxHp:1000+(wave*100),

speed:0.6,

size:60,

reward:500,

boss:true,

x:player.x+1000,

y:player.y+1000

});

}

function bossCheck(){

if(wave%5===0){

let found=false;

for(let e of enemies){

if(e.boss){

found=true;

}

}

if(!found){

spawnBoss();

}

}

}

// ============================
// SAVE SYSTEM
// ============================

function saveGame(){

localStorage.setItem(

"mgotfps",

JSON.stringify({

coins,
xp,
level,

damageLevel,
fireRateLevel,
hpLevel

})

);

}

function loadGame(){

const save=
localStorage.getItem(
"mgotfps"
);

if(!save) return;

const data=
JSON.parse(save);

coins=data.coins||0;
xp=data.xp||0;
level=data.level||1;

damageLevel=
data.damageLevel||1;

fireRateLevel=
data.fireRateLevel||1;

hpLevel=
data.hpLevel||1;

}

loadGame();

setInterval(saveGame,5000);

// ============================
// PATCH KILL FUNCTION
// ============================

const oldKillEnemy=killEnemy;

killEnemy=function(index,e){

player.score++;

coins+=e.reward;

xp+=e.reward;

enemiesKilledThisWave++;

dropCoin(
e.x,
e.y,
Math.floor(
e.reward/2
)
);

if(player.score>=10){

unlockAchievement(
"First Blood"
);

}

if(player.score>=100){

unlockAchievement(
"Destroyer"
);

}

if(enemiesKilledThisWave
>=
enemiesNeededForWave){

nextWave();

}

enemies.splice(index,1);

checkLevelUp();

createKillEffect();

};

// ============================
// PATCH GAME LOOP
// ============================

const oldLoopPart4=gameLoop;

gameLoop=function(){

if(gameStarted){

updatePlayer();

updateBullets();

updateEnemies();

updateParticles();

updateCoins();

collectCoins();

bulletCollision();

updateRecoil();

bossCheck();

}

drawFloor();

drawCoins();

drawBullets();

drawEnemies();

drawParticles();

drawPlayerMarker();

drawDirection();

drawMiniMap();

drawMuzzleFlash();

updateHUD();

updateXPHud();

updateWaveHUD();

if(player.hp<=0){

gameOver();

return;

}

requestAnimationFrame(gameLoop);

};

gameLoop();
// ============================
// MGOT FPS PART 5
// MAPS + WALLS + WEAPONS
// ============================

// ============================
// WALLS
// ============================

const walls=[];

function createArena(){

walls.length=0;

for(let i=0;i<40;i++){

walls.push({

x:(Math.random()-0.5)*4000,
y:(Math.random()-0.5)*4000,

w:100+Math.random()*200,
h:100+Math.random()*200

});

}

}

createArena();

// ============================
// WALL DRAW
// ============================

function drawWalls(){

ctx.fillStyle="#555";

for(const wall of walls){

const sx=
canvas.width/2+(wall.x-player.x);

const sy=
canvas.height/2+(wall.y-player.y);

ctx.fillRect(
sx,
sy,
wall.w,
wall.h
);

}

}

// ============================
// PLAYER COLLISION
// ============================

function wallCollision(){

for(const wall of walls){

if(

player.x > wall.x-20 &&
player.x < wall.x+wall.w+20 &&
player.y > wall.y-20 &&
player.y < wall.y+wall.h+20

){

if(keys["w"]) player.y+=player.speed;
if(keys["s"]) player.y-=player.speed;
if(keys["a"]) player.x+=player.speed;
if(keys["d"]) player.x-=player.speed;

}

}

}

// ============================
// WEAPONS
// ============================

const weapons={

pistol:{
name:"Pistol",
damage:25,
speed:18,
fireRate:250,
ammo:12
},

smg:{
name:"SMG",
damage:12,
speed:20,
fireRate:70,
ammo:40
},

shotgun:{
name:"Shotgun",
damage:15,
speed:16,
fireRate:500,
ammo:8
},

sniper:{
name:"Sniper",
damage:120,
speed:35,
fireRate:900,
ammo:5
},

rocket:{
name:"Rocket",
damage:300,
speed:8,
fireRate:1200,
ammo:1
}

};

let currentWeapon="pistol";

// ============================
// SWITCH WEAPON
// ============================

document.addEventListener(
"keydown",
e=>{

if(e.key==="1")
equipWeapon("pistol");

if(e.key==="2")
equipWeapon("smg");

if(e.key==="3")
equipWeapon("shotgun");

if(e.key==="4")
equipWeapon("sniper");

if(e.key==="5")
equipWeapon("rocket");

}
);

function equipWeapon(name){

currentWeapon=name;

weapon.damage=
weapons[name].damage;

weapon.bulletSpeed=
weapons[name].speed;

weapon.fireRate=
weapons[name].fireRate;

player.ammo=
weapons[name].ammo;

}

// ============================
// WEAPON HUD
// ============================

const weaponHud=
document.createElement("div");

weaponHud.style.position="fixed";
weaponHud.style.bottom="20px";
weaponHud.style.left="20px";
weaponHud.style.color="white";
weaponHud.style.zIndex="999";

document.body.appendChild(
weaponHud
);

function updateWeaponHUD(){

weaponHud.innerHTML=`

Weapon:
${weapons[currentWeapon].name}

`;

}

// ============================
// SHOTGUN SPREAD
// ============================

const originalShoot=shoot;

shoot=function(){

if(!gameStarted) return;

if(!canShoot) return;

if(player.ammo<=0) return;

player.ammo--;

canShoot=false;

setTimeout(()=>{

canShoot=true;

},weapon.fireRate);

if(currentWeapon==="shotgun"){

for(let i=0;i<6;i++){

const spread=
(Math.random()-0.5)*0.4;

bullets.push({

x:player.x,
y:player.y,

vx:
Math.cos(
player.angle+spread
)
*
weapon.bulletSpeed,

vy:
Math.sin(
player.angle+spread
)
*
weapon.bulletSpeed,

life:50

});

}

}

else{

bullets.push({

x:player.x,
y:player.y,

vx:
Math.cos(player.angle)
*
weapon.bulletSpeed,

vy:
Math.sin(player.angle)
*
weapon.bulletSpeed,

life:100

});

}

createMuzzleFlash();

};

// ============================
// ROCKETS
// ============================

const explosions=[];

function createExplosion(x,y){

explosions.push({

x,
y,

radius:20,

life:40

});

for(const e of enemies){

const dist=Math.hypot(

x-e.x,
y-e.y

);

if(dist<200){

e.hp-=250;

}

}

}

function updateExplosions(){

for(let i=
explosions.length-1;
i>=0;
i--){

const ex=
explosions[i];

ex.radius+=4;

ex.life--;

if(ex.life<=0){

explosions.splice(i,1);

}

}

}

function drawExplosions(){

for(const ex of explosions){

const sx=
canvas.width/2+
(ex.x-player.x);

const sy=
canvas.height/2+
(ex.y-player.y);

ctx.beginPath();

ctx.arc(
sx,
sy,
ex.radius,
0,
Math.PI*2
);

ctx.strokeStyle="orange";
ctx.lineWidth=5;
ctx.stroke();

}

}

// ============================
// ROCKET IMPACT
// ============================

const oldBulletCollision=
bulletCollision;

bulletCollision=function(){

for(
let i=bullets.length-1;
i>=0;
i--
){

const b=bullets[i];

for(
let j=enemies.length-1;
j>=0;
j--
){

const e=enemies[j];

const dist=Math.hypot(
b.x-e.x,
b.y-e.y
);

if(dist<e.size){

if(
currentWeapon==="rocket"
){

createExplosion(
b.x,
b.y
);

}

e.hp-=weapon.damage;

bullets.splice(i,1);

if(e.hp<=0){

killEnemy(j,e);

}

break;

}

}

}

};

hp:100000,

maxHp:100000,

size:180,

reward:25000,

x:player.x+3000,

y:player.y+3000

});

showAchievement(
"Mythic Boss"
);

}

function updateMythicBosses(){

for(const boss of mythicBosses){

const dx=
player.x-boss.x;

const dy=
player.y-boss.y;

const dist=
Math.hypot(dx,dy);

if(dist>0){

boss.x+=
(dx/dist)*0.3;

boss.y+=
(dy/dist)*0.3;

}

}

}

function drawMythicBosses(){

for(const boss of mythicBosses){

const sx=
canvas.width/2+
(boss.x-player.x);

const sy=
canvas.height/2+
(boss.y-player.y);

ctx.fillStyle="#ff00ff";

ctx.beginPath();

ctx.arc(
sx,
sy,
boss.size,
0,
Math.PI*2
);

ctx.fill();

}

}
