<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MGOT Mobile SAFE</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#87CEEB;
    touch-action:none;
}

canvas {
    display:block;
}

#controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-around;
    z-index:10;
}

button {
    width:80px;
    height:80px;
    font-size:30px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.3);
    color:white;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="controls">
    <button id="left">⬅️</button>
    <button id="jump">⤒</button>
    <button id="right">➡️</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// FIX: správne rozmery
function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const GRAVITY = 0.8;

// PLAYER
const p = {
    x:100,
    y:100,
    w:40,
    h:50,
    vx:0,
    vy:0,
    speed:5,
    jump:14,
    grounded:false
};

// JEDNODUCHÁ ZEM (NEMENÍ SA)
const groundY = c.height - 100;

// INPUT FLAGS
let left = false;
let right = false;
let jump = false;

// MOBILE INPUT (SAFE)
document.getElementById("left").addEventListener("touchstart", ()=> left=true);
document.getElementById("left").addEventListener("touchend", ()=> left=false);

document.getElementById("right").addEventListener("touchstart", ()=> right=true);
document.getElementById("right").addEventListener("touchend", ()=> right=false);

document.getElementById("jump").addEventListener("touchstart", ()=> jump=true);
document.getElementById("jump").addEventListener("touchend", ()=> jump=false);

// DESKTOP fallback
document.addEventListener("keydown", e=>{
    if(e.key==="a") left=true;
    if(e.key==="d") right=true;
    if(e.key===" " && p.grounded) p.vy=-p.jump;
});
document.addEventListener("keyup", e=>{
    if(e.key==="a") left=false;
    if(e.key==="d") right=false;
});

function update(){

    // movement
    if(left) p.vx = -p.speed;
    else if(right) p.vx = p.speed;
    else p.vx = 0;

    // jump (mobile SAFE)
    if(jump && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
        jump = false; // prevent spam
    }

    // physics
    p.vy += GRAVITY;

    p.x += p.vx;
    p.y += p.vy;

    // GROUND FIX (NAJSTABILNEJŠIE RIEŠENIE)
    if(p.y + p.h >= groundY){
        p.y = groundY - p.h;
        p.vy = 0;
        p.grounded = true;
    }
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // ground
    ctx.fillStyle="green";
    ctx.fillRect(0,groundY,c.width,100);

    // player
    ctx.fillStyle="red";
    ctx.fillRect(p.x,p.y,p.w,p.h);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
