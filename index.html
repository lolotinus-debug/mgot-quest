<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MGOT Platform Adventure</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#87ceeb;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:24px;
font-weight:bold;
text-shadow:2px 2px 4px black;
z-index:100;
}

.mobile{
position:fixed;
bottom:20px;
width:80px;
height:80px;
border:none;
border-radius:50%;
font-size:28px;
background:rgba(255,255,255,0.7);
z-index:100;
}

#leftBtn{
left:20px;
}

#jumpBtn{
right:20px;
}

#rightBtn{
right:120px;
}
</style>
</head>
<body>

<div id="ui"></div>

<button id="leftBtn" class="mobile">◀</button>
<button id="rightBtn" class="mobile">▶</button>
<button id="jumpBtn" class="mobile">⬆</button>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

const ui=document.getElementById("ui");

const gravity=0.8;

let score=0;
let lives=3;

const player={
x:100,
y:300,
w:42,
h:48,
vx:0,
vy:0,
speed:6,
jump:16,
grounded:false
};

let camX=0;

const platforms=[
{x:0,y:600,w:5000,h:200},

{x:350,y:500,w:140,h:20},
{x:600,y:430,w:140,h:20},
{x:850,y:360,w:140,h:20},
{x:1100,y:290,w:140,h:20},

{x:1450,y:500,w:150,h:20},
{x:1750,y:430,w:150,h:20},
{x:2050,y:350,w:150,h:20},

{x:2500,y:500,w:200,h:20},
{x:2800,y:420,w:200,h:20},
{x:3100,y:330,w:200,h:20}
];

const coins=[
{x:390,y:450,c:false},
{x:640,y:380,c:false},
{x:890,y:310,c:false},
{x:1140,y:240,c:false},

{x:1490,y:450,c:false},
{x:1790,y:380,c:false},
{x:2090,y:300,c:false},

{x:2540,y:450,c:false},
{x:2840,y:370,c:false},
{x:3140,y:280,c:false}
];

const enemies=[
{x:950,y:320,w:40,h:40,dir:1},
{x:1900,y:390,w:40,h:40,dir:-1},
{x:2950,y:290,w:40,h:40,dir:1}
];

const finish={
x:3600,
y:500,
w:40,
h:100
};

let left=false;
let right=false;
let jump=false;

document.addEventListener("keydown",e=>{
if(e.key==="a"||e.key==="ArrowLeft") left=true;
if(e.key==="d"||e.key==="ArrowRight") right=true;
if(e.code==="Space") jump=true;
});

document.addEventListener("keyup",e=>{
if(e.key==="a"||e.key==="ArrowLeft") left=false;
if(e.key==="d"||e.key==="ArrowRight") right=false;
if(e.code==="Space") jump=false;
});

function hold(btn,action){

btn.addEventListener("pointerdown",()=>{
action(true);
});

btn.addEventListener("pointerup",()=>{
action(false);
});

btn.addEventListener("pointerleave",()=>{
action(false);
});
}

hold(
document.getElementById("leftBtn"),
v=>left=v
);

hold(
document.getElementById("rightBtn"),
v=>right=v
);

hold(
document.getElementById("jumpBtn"),
v=>jump=v
);

function resetPlayer(){
player.x=100;
player.y=100;
player.vx=0;
player.vy=0;
}

function update(){

player.vx=0;

if(left) player.vx=-player.speed;
if(right) player.vx=player.speed;

if(jump && player.grounded){
player.vy=-player.jump;
player.grounded=false;
}

player.vy+=gravity;

player.x+=player.vx;
player.y+=player.vy;

player.grounded=false;

for(const plat of platforms){

if(
player.x < plat.x + plat.w &&
player.x + player.w > plat.x
){

const prevBottom =
player.y + player.h - player.vy;

const currentBottom =
player.y + player.h;

if(
prevBottom <= plat.y &&
currentBottom >= plat.y &&
player.vy >= 0
){
player.y = plat.y - player.h;
player.vy = 0;
player.grounded = true;
}
}
}

for(const coin of coins){

if(coin.c) continue;

if(
player.x < coin.x+24 &&
player.x+player.w > coin.x &&
player.y < coin.y+24 &&
player.y+player.h > coin.y
){
coin.c=true;
score+=10;
}
}

for(const e of enemies){

e.x+=e.dir*2;

if(!e.start) e.start=e.x;

if(e.x<e.start-80) e.dir=1;
if(e.x>e.start+80) e.dir=-1;

if(
player.x < e.x+e.w &&
player.x+player.w > e.x &&
player.y < e.y+e.h &&
player.y+player.h > e.y
){
lives--;

if(lives<=0){
alert("GAME OVER");
location.reload();
}

resetPlayer();
}
}

if(
player.x < finish.x+finish.w &&
player.x+player.w > finish.x &&
player.y < finish.y+finish.h &&
player.y+player.h > finish.y
){
alert(
"🎉 LEVEL COMPLETE!\n\nCoins: "+
score
);
location.reload();
}

if(player.y>canvas.height+300){

lives--;

if(lives<=0){
alert("GAME OVER");
location.reload();
}

resetPlayer();
}

camX=player.x-250;

if(camX<0) camX=0;

}

function drawCloud(x,y){

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.arc(x+25,y-10,30,0,Math.PI*2);
ctx.arc(x+55,y,25,0,Math.PI*2);
ctx.fill();

}

function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#87CEEB";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="white";

for(let i=0;i<12;i++){

let cx=
(i*400-camX*0.3)%5000;

drawCloud(
cx,
120+(i%3)*40
);

}

ctx.fillStyle="#2e8b57";

for(const p of platforms){

ctx.fillRect(
p.x-camX,
p.y,
p.w,
p.h
);

}

for(const coin of coins){

if(coin.c) continue;

ctx.fillStyle="gold";

ctx.beginPath();
ctx.arc(
coin.x-camX,
coin.y,
12,
0,
Math.PI*2
);
ctx.fill();

ctx.strokeStyle="#ffd700";
ctx.lineWidth=3;
ctx.stroke();
}

for(const e of enemies){

ctx.font="34px Arial";

ctx.fillText(
"👾",
e.x-camX,
e.y+32
);

}

ctx.fillStyle="white";

ctx.fillRect(
finish.x-camX,
finish.y,
5,
finish.h
);

ctx.fillStyle="red";

ctx.fillRect(
finish.x-camX,
finish.y,
35,
20
);

ctx.font="42px Arial";

const skins=["🧙","🏃","🤖"];

let frame =
Math.floor(Date.now()/150)%skins.length;

ctx.fillText(
skins[frame],
player.x-camX,
player.y+38
);

ui.innerHTML=
"🪙 Coins: "+score+
"<br>❤️ Lives: "+lives+
"<br>🏁 Goal: Reach the flag";
}

function loop(){

update();
draw();

requestAnimationFrame(
loop
);

}

loop();

</script>

</body>
</html>
