<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>MGOT Survivor Ultimate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
-webkit-user-select:none;
user-select:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#101010;
font-family:Arial,sans-serif;
}

canvas{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background:#171717;
}

#hud{
position:fixed;
top:10px;
left:10px;
z-index:100;
color:white;
font-size:16px;
background:rgba(0,0,0,.45);
padding:10px;
border-radius:12px;
backdrop-filter:blur(4px);
min-width:160px;
}

.stat{
margin-bottom:4px;
}

.bar{
width:180px;
height:14px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
width:100%;
}

#hpFill{
background:#00d95f;
}

#xpFill{
background:#00aaff;
width:0%;
}

#waveBox{
position:fixed;
top:10px;
right:10px;
padding:10px 16px;
background:rgba(0,0,0,.5);
color:white;
border-radius:12px;
font-size:18px;
z-index:100;
}

#joystick{
position:fixed;
left:20px;
bottom:20px;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,.12);
z-index:200;
}

#stick{
position:absolute;
left:40px;
top:40px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,.7);
}

#fireBtn{
position:fixed;
right:30px;
bottom:40px;
width:120px;
height:120px;
border-radius:50%;
border:none;
background:#ff3a3a;
color:white;
font-size:22px;
font-weight:bold;
z-index:200;
}

#pauseBtn{
position:fixed;
right:30px;
top:70px;
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:26px;
background:#444;
color:white;
z-index:200;
}

.panel{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:999;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.panel h1{
margin-bottom:20px;
}

.menuBtn{
padding:15px 25px;
font-size:20px;
margin:10px;
border:none;
border-radius:12px;
}

#upgradeContainer{
width:90%;
max-width:700px;
display:flex;
flex-direction:column;
gap:15px;
}

.upgradeCard{
background:#222;
border:2px solid #555;
border-radius:14px;
padding:20px;
font-size:18px;
}

#shopContainer{
width:90%;
max-width:700px;
display:flex;
flex-direction:column;
gap:12px;
}

.shopItem{
background:#222;
padding:18px;
border-radius:12px;
border:1px solid #555;
}

.damageText{
position:absolute;
font-weight:bold;
pointer-events:none;
color:white;
font-size:20px;
}

</style>
</head>
<body>

<div id="hud">

<div class="stat">
HP

</div>

<br>

<div class="stat">
XP
</div>

<div class="bar">

</div>

<br>

<div>
LVL:
<span id="lvl">1</span>
</div>

<div>
Coins:
<span id="coins">0</span>

<div>
Kills:
<span id="kills">0</span>
</div>

<div>
Weapon:
<span id="weaponName">Pistol</span>
</div>

</div>

Wave <span id="wave">1</span>

<div id="joystick">

</button>

II

</button>

</div>

CLOSE
</button>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

resize();

addEventListener(
"resize",
resize
);

let gameRunning=true;
let paused=false;
let autoFire=false;

let score=0;
let wave=1;
let kills=0;

const camera={
x:0,
y:0
};

const bullets=[];
const enemies=[];
const drops=[];
const effects=[];

const player={

x:0,
y:0,
angle:0,
size:25,

speed:5,

maxHp:100,
hp:100,

xp:0,
level:1,

coins:0,

pickupRange:120

};

const weapons={

pistol:{
name:"Pistol",
damage:20,
fireRate:250,
bulletSpeed:12,
multiShot:1
},

smg:{
name:"SMG",
damage:12,
fireRate:90,
bulletSpeed:13,
multiShot:1
},

shotgun:{
name:"Shotgun",
damage:10,
fireRate:500,
bulletSpeed:11,
multiShot:5
},

sniper:{
name:"Sniper",
damage:90,
fireRate:900,
bulletSpeed:20,
multiShot:1
}

};

let currentWeapon="pistol";

const soldierImg = new Image();
soldierImg.src="soldier.png";
const enemyImg = new Image();
enemyImg.src = "enemysoldier.png";
const joystick=
document.getElementById("joystick");

const stick=
document.getElementById("stick");

const fireBtn=
document.getElementById("fireBtn");

let moveX=0;
let moveY=0;

let dragging=false;
let canShoot=true;

joystick.addEventListener(
"touchstart",
()=>{
dragging=true;
}
);

joystick.addEventListener(
"touchmove",
e=>{

if(!dragging)return;

const touch=e.touches[0];

const rect=
joystick.getBoundingClientRect();

const cx=rect.width/2;
const cy=rect.height/2;

let dx=
touch.clientX-
rect.left-
cx;

let dy=
touch.clientY-
rect.top-
cy;

const dist=
Math.hypot(dx,dy);

const max=40;

if(dist>max){

dx=(dx/dist)*max;
dy=(dy/dist)*max;

}

stick.style.left=
(dx+40)+"px";

stick.style.top=
(dy+40)+"px";

moveX=dx/max;
moveY=dy/max;

}
);

joystick.addEventListener(
"touchend",
()=>{

dragging=false;

moveX=0;
moveY=0;

stick.style.left="40px";
stick.style.top="40px";

}
);

fireBtn.addEventListener(
"touchstart",
()=>{
autoFire=true;
}
);

fireBtn.addEventListener(
"touchend",
()=>{
autoFire=false;
}
);

function updatePlayer(){

player.x+=
moveX*player.speed;

player.y+=
moveY*player.speed;

camera.x=player.x;
camera.y=player.y;

const hpPercent=
(player.hp/player.maxHp)*100;

document.getElementById(
"hpFill"
).style.width=
hpPercent+"%";

document.getElementById(
"lvl"
).textContent=
player.level;

document.getElementById(
"coins"
).textContent=
player.coins;

document.getElementById(
"kills"
).textContent=
kills;

document.getElementById(
"weaponName"
).textContent=
weapons[currentWeapon].name;

if(player.hp<=0){

player.hp=0;

gameOver();

}

}

function addXP(amount){

player.xp+=amount;

let need=
player.level*100;

while(player.xp>=need){

player.xp-=need;

player.level++;

showLevelUp();

need=
player.level*100;

}

const percent=
(player.xp/need)*100;

document.getElementById(
"xpFill"
).style.width=
percent+"%";

}

function updateWeapon(){

if(autoFire){

shoot();

}

}

function shoot(){

if(!canShoot)return;

if(enemies.length===0)return;

canShoot=false;

setTimeout(()=>{

canShoot=true;

},
weapons[currentWeapon].fireRate
);

let target=enemies[0];

let nearest=999999;

for(const e of enemies){

const dist=Math.hypot(
e.x-player.x,
e.y-player.y
);

if(dist<nearest){

nearest=dist;
target=e;

}

}

const dx=
target.x-player.x;

const dy=
target.y-player.y;

player.angle =
Math.atan2(dy, dx);

const len=
Math.hypot(dx,dy);

const multi=
weapons[currentWeapon]
.multiShot;

for(let i=0;i<multi;i++){

let spread=0;

if(multi>1){

spread=
(i-(multi-1)/2)*0.15;

}

const cos=
Math.cos(spread);

const sin=
Math.sin(spread);

const vx=
(dx/len)*cos-
(dy/len)*sin;

const vy=
(dx/len)*sin+
(dy/len)*cos;

bullets.push({

x:player.x,
y:player.y,

vx:
vx*
weapons[currentWeapon]
.bulletSpeed,

vy:
vy*
weapons[currentWeapon]
.bulletSpeed,

damage:
weapons[currentWeapon]
.damage,

life:100

});

}

}

function updateBullets(){

for(
let i=bullets.length-1;
i>=0;
i--
){

const b=bullets[i];

b.x+=b.vx;
b.y+=b.vy;

b.life--;

if(b.life<=0){

bullets.splice(i,1);

}

}

}

function drawBullets(){

ctx.fillStyle="yellow";

for(const b of bullets){

ctx.beginPath();

ctx.arc(

b.x-camera.x+
canvas.width/2,

b.y-camera.y+
canvas.height/2,

5,
0,
Math.PI*2

);

ctx.fill();

}

}


function drawPlayer(){

ctx.save();

ctx.translate(
canvas.width/2,
canvas.height/2
);

ctx.rotate(player.angle - Math.PI/2);

if(
soldierImg.complete &&
soldierImg.naturalWidth
){

ctx.drawImage(
soldierImg,
-32,
-32,
64,
64
);

}else{

ctx.fillStyle="cyan";

ctx.beginPath();
ctx.arc(
0,
0,
25,
0,
Math.PI*2
);
ctx.fill();

}

ctx.restore();

}

function drawGrid(){

ctx.strokeStyle="#222";

for(
let x=-5000;
x<5000;
x+=100
){

ctx.beginPath();

ctx.moveTo(
x-camera.x+
canvas.width/2,
0
);

ctx.lineTo(
x-camera.x+
canvas.width/2,
canvas.height
);

ctx.stroke();

}

for(
let y=-5000;
y<5000;
y+=100
){

ctx.beginPath();

ctx.moveTo(
0,
y-camera.y+
canvas.height/2
);

ctx.lineTo(
canvas.width,
y-camera.y+
canvas.height/2
);

ctx.stroke();

}

  }
// ================= ENEMIES =================

function spawnEnemy(type="walker"){

let angle=Math.random()*Math.PI*2;
let distance=700+Math.random()*300;

let enemy={

x:player.x+Math.cos(angle)*distance,
y:player.y+Math.sin(angle)*distance,

type:type,

size:22,
speed:1.5,

hp:60+(wave*10),
maxHp:60+(wave*10),

damage:0.2,
reward:5

};

if(type==="runner"){

enemy.speed=3.5;
enemy.hp=40+(wave*8);
enemy.maxHp=enemy.hp;
enemy.reward=8;

}

if(type==="tank"){

enemy.speed=0.8;
enemy.hp=300+(wave*50);
enemy.maxHp=enemy.hp;
enemy.size=30;
enemy.reward=20;

}

if(type==="shooter"){

enemy.speed=1.2;
enemy.hp=120+(wave*15);
enemy.maxHp=enemy.hp;
enemy.reward=12;

}

enemies.push(enemy);

}

function spawnBoss(){

enemies.push({

x:player.x+1000,
y:player.y+1000,

type:"boss",

size:55,

speed:1.2,

hp:3000+(wave*500),
maxHp:3000+(wave*500),

damage:1,

reward:200

});

}

setInterval(()=>{

if(!gameRunning) return;
if(paused) return;

let limit=
15+(wave*2);

if(enemies.length<limit){

let rnd=Math.random();

if(rnd<0.55){

spawnEnemy("walker");

}else if(rnd<0.75){

spawnEnemy("runner");

}else if(rnd<0.92){

spawnEnemy("shooter");

}else{

spawnEnemy("tank");

}

}

},1200);

// ================= ENEMY UPDATE =================

function updateEnemies(){

for(const e of enemies){

let dx=
player.x-e.x;

let dy=
player.y-e.y;

let dist=
Math.hypot(dx,dy);

if(dist>0){

e.x+=(dx/dist)*e.speed;
e.y+=(dy/dist)*e.speed;

}

if(dist<40){

player.hp-=e.damage;

}

}

}

// ================= DAMAGE TEXT =================

function createDamageText(
x,
y,
value
){

effects.push({

x:x,
y:y,

text:value,

life:50,
vy:-1

});

}

function updateEffects(){

for(
let i=effects.length-1;
i>=0;
i--
){

let ef=
effects[i];

ef.y+=ef.vy;
ef.life--;

if(ef.life<=0){

effects.splice(i,1);

}

}

}

function drawEffects(){

ctx.fillStyle="white";
ctx.font="18px Arial";

for(const ef of effects){

ctx.fillText(

ef.text,

ef.x-camera.x+
canvas.width/2,

ef.y-camera.y+
canvas.height/2

);

}

}

// ================= BULLET COLLISION =================

function bulletCollision(){

for(
let i=bullets.length-1;
i>=0;
i--
){

let b=bullets[i];

for(
let j=enemies.length-1;
j>=0;
j--
){

let e=enemies[j];

let dist=Math.hypot(
b.x-e.x,
b.y-e.y
);

if(dist<e.size){

e.hp-=b.damage;

createDamageText(
e.x,
e.y,
Math.floor(b.damage)
);

bullets.splice(i,1);

if(e.hp<=0){

enemyKilled(e);

enemies.splice(j,1);

}

break;

}

}

}

}

// ================= KILL REWARD =================

function enemyKilled(enemy){

kills++;
score++;

player.coins+=enemy.reward;

dropLoot(
enemy.x,
enemy.y
);

addXP(
20+
wave*2
);

if(kills%10===0){

nextWave();

}

}

// ================= WAVES =================

function nextWave(){

wave++;

document.getElementById(
"wave"
).textContent=wave;

if(wave%5===0){

spawnBoss();

}

}

// ================= DRAW ENEMIES =================

function drawEnemies(){

for(const e of enemies){

let sx =
e.x - camera.x + canvas.width/2;

let sy =
e.y - camera.y + canvas.height/2;

// --- SPRITE ---
if(enemyImg.complete && enemyImg.naturalWidth){

ctx.drawImage(
enemyImg,
sx - e.size * 1.5,
sy - e.size * 1.5,
e.size * 3,
e.size * 3
);

}else{

// fallback (ak sa obrázok nenačíta)
ctx.fillStyle = "#66ff66";

ctx.beginPath();
ctx.arc(
sx,
sy,
e.size,
0,
Math.PI*2
);
ctx.fill();

}

// --- HP BAR (necháme ako máš) ---
ctx.fillStyle = "#000";

ctx.fillRect(
sx - 30,
sy - e.size - 15,
60,
6
);

ctx.fillStyle = "lime";

ctx.fillRect(
sx - 30,
sy - e.size - 15,
60 * (e.hp / e.maxHp),
6
);

}

}
// ================= GAME OVER =================

function gameOver(){

gameRunning=false;

document.getElementById(
"finalStats"
).innerHTML=

"Wave: "+wave+
"<br>" +
"Kills: "+kills+
"<br>" +
"Coins: "+player.coins;

document.getElementById(
"gameOver"
).style.display=
"flex";

}

// ================= RESTART =================

document
.getElementById(
"restartBtn"
)
.addEventListener(
"click",
()=>{

location.reload();

}
);

// ================= LOOT SYSTEM =================

function dropLoot(x,y){

// XP GEM

drops.push({

x:x+(Math.random()*40-20),
y:y+(Math.random()*40-20),

type:"xp",

value:15+wave,

size:10

});

// COIN

if(Math.random()<0.8){

drops.push({

x:x+(Math.random()*60-30),
y:y+(Math.random()*60-30),

type:"coin",

value:enemyCoinValue(),

size:10

});

}

// MEDKIT

if(Math.random()<0.12){

drops.push({

x:x+(Math.random()*60-30),
y:y+(Math.random()*60-30),

type:"medkit",

value:25,

size:12

});

}

}

function enemyCoinValue(){

return 2+Math.floor(wave*0.5);

}

// ================= MAGNET =================

function updateDrops(){

for(let i=drops.length-1;i>=0;i--){

const d=drops[i];

const dx=
player.x-d.x;

const dy=
player.y-d.y;

const dist=
Math.hypot(dx,dy);

// magnet radius

if(dist<player.pickupRange){

const speed=
2+
(player.pickupRange-dist)/20;

d.x+=(dx/dist)*speed;
d.y+=(dy/dist)*speed;

}

// pickup

if(dist<25){

collectDrop(d);

drops.splice(i,1);

continue;

}

}

}

function collectDrop(drop){

if(drop.type==="xp"){

addXP(drop.value);

}

else if(drop.type==="coin"){

player.coins+=drop.value;

}

else if(drop.type==="medkit"){

player.hp=Math.min(
player.maxHp,
player.hp+drop.value
);

}

}

// ================= DRAW DROPS =================

function drawDrops(){

for(const d of drops){

const sx=
d.x-camera.x+
canvas.width/2;

const sy=
d.y-camera.y+
canvas.height/2;

if(d.type==="xp"){

ctx.fillStyle="#00aaff";

ctx.beginPath();
ctx.arc(
sx,
sy,
8,
0,
Math.PI*2
);
ctx.fill();

}

else if(d.type==="coin"){

ctx.fillStyle="gold";

ctx.beginPath();
ctx.arc(
sx,
sy,
8,
0,
Math.PI*2
);
ctx.fill();

}

else if(d.type==="medkit"){

ctx.fillStyle="#ff4444";

ctx.fillRect(
sx-8,
sy-8,
16,
16
);

ctx.fillStyle="white";

ctx.fillRect(
sx-2,
sy-6,
4,
12
);

ctx.fillRect(
sx-6,
sy-2,
12,
4
);

}

}

}

// ================= PICKUP UPGRADE HELPERS =================

function increasePickupRange(){

player.pickupRange+=30;

}

function healPlayer(amount){

player.hp=Math.min(
player.maxHp,
player.hp+amount
);

}

// ================= DROP EFFECTS =================

function animateDrops(){

const time=
Date.now()*0.003;

for(const d of drops){

d.floatOffset=
Math.sin(
time+d.x*0.01
)*3;

}

}

// ================= OVERRIDE DRAW DROPS =================

function drawDropsAnimated(){

for(const d of drops){

const sx=
d.x-camera.x+
canvas.width/2;

const sy=
d.y-camera.y+
canvas.height/2+
(d.floatOffset||0);

if(d.type==="xp"){

ctx.fillStyle="#00aaff";

ctx.beginPath();
ctx.arc(
sx,
sy,
8,
0,
Math.PI*2
);
ctx.fill();

}

else if(d.type==="coin"){

ctx.fillStyle="gold";

ctx.beginPath();
ctx.arc(
sx,
sy,
8,
0,
Math.PI*2
);
ctx.fill();

}

else if(d.type==="medkit"){

ctx.fillStyle="#ff4444";

ctx.fillRect(
sx-8,
sy-8,
16,
16
);

ctx.fillStyle="white";

ctx.fillRect(
sx-2,
sy-6,
4,
12
);

ctx.fillRect(
sx-6,
sy-2,
12,
4
);

}

}

}

// ================= AUTO HEAL PER WAVE =================

function rewardWave(){

player.coins+=wave*10;

healPlayer(20);

}

// ================= UPDATE PACKAGE =================

function updateLootSystem(){

animateDrops();

updateDrops();

}

// ================= DRAW PACKAGE =================

function drawLootSystem(){

drawDropsAnimated();

  }

// ================= LEVEL UP SYSTEM =================

const upgradePool=[

{
name:"Damage +10",
desc:"Zvýši poškodenie zbrane",
apply:()=>{

weapons[currentWeapon].damage+=10;

}
},

{
name:"Fire Rate +15%",
desc:"Strieľa rýchlejšie",
apply:()=>{

weapons[currentWeapon].fireRate=
Math.max(
40,
Math.floor(
weapons[currentWeapon].fireRate*0.85
)
);

}
},

{
name:"Bullet Speed +20%",
desc:"Rýchlejšie projektily",
apply:()=>{

weapons[currentWeapon].bulletSpeed*=1.2;

}
},

{
name:"Max HP +25",
desc:"Viac života",
apply:()=>{

player.maxHp+=25;
player.hp+=25;

}
},

{
name:"Heal 50",
desc:"Okamžité liečenie",
apply:()=>{

player.hp=Math.min(
player.maxHp,
player.hp+50
);

}
},

{
name:"Movement Speed +1",
desc:"Rýchlejší pohyb",
apply:()=>{

player.speed+=1;

}
},

{
name:"Magnet Range +50",
desc:"Väčší dosah zbierania",
apply:()=>{

player.pickupRange+=50;

}
},

{
name:"Multishot +1",
desc:"Viac projektilov",
apply:()=>{

weapons[currentWeapon]
.multiShot++;

// ================= OVERRIDE SHOOT =================

const oldShoot=shoot;

shoot=function(){

if(!canShoot)return;

if(enemies.length===0)return;

canShoot=false;

setTimeout(()=>{

canShoot=true;

},
weapons[currentWeapon]
.fireRate
);

let target=enemies[0];
let nearest=999999;

for(const e of enemies){

const dist=Math.hypot(
e.x-player.x,
e.y-player.y
);

if(dist<nearest){

nearest=dist;
target=e;

}

}

const dx=
target.x-player.x;

const dy=
target.y-player.y;
  player.angle = Math.atan2(dy, dx);

const len=
Math.hypot(dx,dy);

const multi=
weapons[currentWeapon]
.multiShot;

for(let i=0;i<multi;i++){

let spread=0;

if(multi>1){

spread=
(i-(multi-1)/2)
*0.15;

}

const cos=
Math.cos(spread);

const sin=
Math.sin(spread);

const vx=
(dx/len)*cos-
(dy/len)*sin;

const vy=
(dx/len)*sin+
(dy/len)*cos;

bullets.push({

x:player.x,
y:player.y,

vx:
vx*
weapons[currentWeapon]
.bulletSpeed,

vy:
vy*
weapons[currentWeapon]
.bulletSpeed,

damage:
getBulletDamage(),

life:100

});

}

};

// ================= ARMOR SUPPORT =================

const oldUpdateEnemies=
updateEnemies;

updateEnemies=function(){

for(const e of enemies){

const dx=
player.x-e.x;

const dy=
player.y-e.y;

const dist=
Math.hypot(dx,dy);

if(dist>0){

e.x+=(dx/dist)*e.speed;
e.y+=(dy/dist)*e.speed;

}

if(dist<40){

const dmg=
Math.max(
0.05,
e.damage-
(player.armor*0.05)
);

player.hp-=dmg;

}

}

};

const mapZones = [];
const mapObjects = [];

const CHUNK_SIZE = 1000;
const MAP_SIZE = 9000;

function generateMap(){

mapObjects.length = 0;
mapZones.length = 0;

const biomeSize = 2000;

for(let x=-MAP_SIZE;x<MAP_SIZE;x+=biomeSize){

for(let y=-MAP_SIZE;y<MAP_SIZE;y+=biomeSize){

let biome;

const r = Math.random();

if(r < 0.30){
biome="forest";
}
else if(r < 0.55){
biome="desert";
}
else if(r < 0.80){
biome="plains";
}
else{
biome="city";
}

mapZones.push({
x,
y,
size:biomeSize,
biome
});

// FOREST

if(biome==="forest"){

for(let i=0;i<80;i++){

mapObjects.push({
x:x+Math.random()*biomeSize,
y:y+Math.random()*biomeSize,
type:"tree"
});

}

}

// DESERT

if(biome==="desert"){

for(let i=0;i<40;i++){

mapObjects.push({
x:x+Math.random()*biomeSize,
y:y+Math.random()*biomeSize,
type:"cactus"
});

}

}

// PLAINS

if(biome==="plains"){

for(let i=0;i<25;i++){

mapObjects.push({
x:x+Math.random()*biomeSize,
y:y+Math.random()*biomeSize,
type:"bush"
});

}

}

// CITY

if(biome==="city"){

for(let i=0;i<20;i++){

mapObjects.push({
x:x+Math.random()*biomeSize,
y:y+Math.random()*biomeSize,
type:"building"
});

}

}

}

}

}

function drawMapObjects(){

for(const obj of mapObjects){

const sx = obj.x - camera.x + canvas.width/2;
const sy = obj.y - camera.y + canvas.height/2;

if(
sx < -100 || sx > canvas.width+100 ||
sy < -100 || sy > canvas.height+100
) continue;

// 🌲 TREE
if(obj.type==="tree"){

ctx.fillStyle="#1b6b2a";

ctx.beginPath();
ctx.arc(sx, sy, 18, 0, Math.PI*2);
ctx.fill();

// trunk
ctx.fillStyle="#4b2e1a";
ctx.fillRect(sx-3, sy+8, 6, 14);

}

// 🪨 ROCK
else if(obj.type==="rock"){

ctx.fillStyle="#6e6e6e";

ctx.beginPath();
ctx.arc(sx, sy, 14, 0, Math.PI*2);
ctx.fill();

}

else if(obj.type==="building"){

ctx.fillStyle="#666";

ctx.fillRect(
sx-20,
sy-20,
40,
40
);

ctx.fillStyle="#88ccff";

ctx.fillRect(
sx-10,
sy-10,
8,
8
);

ctx.fillRect(
sx+2,
sy-10,
8,
8
);

}
  
else if(obj.type==="bush"){

ctx.fillStyle="#4CAF50";

ctx.beginPath();
ctx.arc(
sx,
sy,
12,
0,
Math.PI*2
);
ctx.fill();

}
  
else if(obj.type==="cactus"){

ctx.fillStyle="#4CAF50";

ctx.fillRect(
sx-5,
sy-15,
10,
30
);

}
  
// 🛣️ ROAD (🔥 KLÚČOVÉ)
else if(obj.type==="road"){

ctx.fillStyle="#2a2a2a";
ctx.fillRect(sx-25, sy-25, 50, 50);

// road highlight
ctx.strokeStyle="#3a3a3a";
ctx.strokeRect(sx-25, sy-25, 50, 50);

}

}

  }
