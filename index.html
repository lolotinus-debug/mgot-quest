<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGOT FIX</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

// FIX: konštantná gravitácia
const GRAVITY = 0.8;

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// PLAYER
const p = {
    x: 100,
    y: 100,
    w: 40,
    h: 50,
    vx: 0,
    vy: 0,
    speed: 6,
    jump: 16,
    grounded: false
};

// FIX: zem je JEDNA veľká platforma (test stabilita)
const platforms = [
    { x: 0, y: 500, w: 5000, h: 200 }, // OBROVSKÁ ZEM
    { x: 300, y: 380, w: 150, h: 20 },
    { x: 600, y: 320, w: 150, h: 20 },
    { x: 900, y: 260, w: 150, h: 20 }
];

// CAMERA
let camX = 0;

function update(){

    // reset horizontal
    p.vx = 0;

    if(keys["a"] || keys["arrowleft"]) p.vx = -p.speed;
    if(keys["d"] || keys["arrowright"]) p.vx = p.speed;

    if((keys[" "] || keys["w"] || keys["arrowup"]) && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
    }

    // APPLY X
    p.x += p.vx;

    // APPLY Y
    p.vy += GRAVITY;
    p.y += p.vy;

    // FIX: vždy reset grounded
    p.grounded = false;

    // COLLISION (DÔLEŽITÉ: po pohybe Y)
    for(let plat of platforms){

        const isOverlappingX =
            p.x < plat.x + plat.w &&
            p.x + p.w > plat.x;

        const isFallingOntoPlatform =
            p.y + p.h <= plat.y &&
            p.y + p.h + p.vy >= plat.y;

        if(isOverlappingX && isFallingOntoPlatform){
            p.y = plat.y - p.h;
            p.vy = 0;
            p.grounded = true;
        }
    }

    // camera follow
    camX = p.x - 200;

    // fail safe (ak spadne)
    if(p.y > 1000){
        p.x = 100;
        p.y = 100;
        p.vy = 0;
    }
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // platforms
    ctx.fillStyle = "green";
    for(let plat of platforms){
        ctx.fillRect(plat.x - camX, plat.y, plat.w, plat.h);
    }

    // player
    ctx.fillStyle = "red";
    ctx.fillRect(p.x - camX, p.y, p.w, p.h);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
