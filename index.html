<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGOT Stable</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const GRAVITY = 0.8;

// INPUT
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// PLAYER
const player = {
    x: 100,
    y: 100,
    w: 40,
    h: 50,
    vx: 0,
    vy: 0,
    speed: 5,
    jump: 14,
    grounded: false
};

// FIXED WORLD (NEZMENÍ SA)
const groundY = 500;

const platforms = [
    {x:0, y:groundY, w:5000, h:200}, // HLAVNÁ ZEM
    {x:300, y:380, w:150, h:20},
    {x:600, y:320, w:150, h:20},
    {x:900, y:260, w:150, h:20}
];

// CAMERA
let cameraX = 0;

function update(){

    // reset
    player.vx = 0;

    if(keys["a"] || keys["arrowleft"]) player.vx = -player.speed;
    if(keys["d"] || keys["arrowright"]) player.vx = player.speed;

    // jump (LEN ak je na zemi)
    if((keys[" "] || keys["w"] || keys["arrowup"]) && player.grounded){
        player.vy = -player.jump;
        player.grounded = false;
    }

    // X movement
    player.x += player.vx;

    // Y movement
    player.vy += GRAVITY;
    player.y += player.vy;

    // IMPORTANT: vždy reset
    player.grounded = false;

    // COLLISION FIX (najdôležitejšia časť)
    for(let p of platforms){

        const withinX =
            player.x < p.x + p.w &&
            player.x + player.w > p.x;

        const hitFromAbove =
            player.y + player.h >= p.y &&
            player.y + player.h - player.vy <= p.y;

        if(withinX && hitFromAbove && player.vy >= 0){
            player.y = p.y - player.h;
            player.vy = 0;
            player.grounded = true;
        }
    }

    // CAMERA
    cameraX = player.x - 200;

    // FALL RESET
    if(player.y > 1000){
        player.x = 100;
        player.y = 100;
        player.vy = 0;
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // platformy
    ctx.fillStyle = "green";
    for(let p of platforms){
        ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
    }

    // player
    ctx.fillStyle = "red";
    ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
