<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGOT FINAL FIX</title>

<style>
body { margin:0; overflow:hidden; background:#6ec6ff; }
canvas { display:block; touch-action:none; }

#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const ui = document.getElementById("ui");

const GRAVITY = 0.8;

// PLAYER
const p = {
    x:100,
    y:100,
    w:40,
    h:50,
    vx:0,
    vy:0,
    speed:6,
    jump:15,
    grounded:false
};

// FIX: jednoduchý svet (žiadne glitch platformy)
const groundY = () => c.height - 120;

const platforms = [
    {x:0, y:groundY(), w:5000, h:200},
    {x:400, y:380, w:150, h:20},
    {x:700, y:320, w:150, h:20},
    {x:1000, y:260, w:150, h:20},
    {x:1300, y:220, w:150, h:20}
];

// INPUT
let left=false,right=false,jump=false;

document.addEventListener("keydown",e=>{
    if(e.key==="a") left=true;
    if(e.key==="d") right=true;
    if(e.key===" ") jump=true;
});
document.addEventListener("keyup",e=>{
    if(e.key==="a") left=false;
    if(e.key==="d") right=false;
    if(e.key===" ") jump=false;
});

// MOBILE (pointer FIX)
function bind(id,type){
    const el=document.createElement("button");
    el.innerText=type;
    el.style.position="fixed";
    el.style.bottom="20px";
    el.style.width="80px";
    el.style.height="80px";
    el.style.fontSize="20px";
    document.body.appendChild(el);

    if(type==="L") el.style.left="20px";
    if(type==="R") el.style.right="20px";
    if(type==="J") el.style.left="50%";

    el.addEventListener("pointerdown",()=>{
        if(type==="L") left=true;
        if(type==="R") right=true;
        if(type==="J") jump=true;
    });

    el.addEventListener("pointerup",()=>{
        left=right=jump=false;
    });
}

bind("l","L");
bind("r","R");
bind("j","J");

let camX=0;

function update(){

    // movement
    p.vx = 0;
    if(left) p.vx = -p.speed;
    if(right) p.vx = p.speed;

    if(jump && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
    }

    // physics
    p.vy += GRAVITY;

    // X first
    p.x += p.vx;

    // Y second
    p.y += p.vy;

    p.grounded = false;

    // 🟢 FIXED COLLISION (najdôležitejšia časť)
    for(let plat of platforms){

        let overlapX =
            p.x < plat.x + plat.w &&
            p.x + p.w > plat.x;

        let fallingOnto =
            p.y + p.h <= plat.y &&
            p.y + p.h + p.vy >= plat.y;

        if(overlapX && fallingOnto && p.vy >= 0){
            p.y = plat.y - p.h;
            p.vy = 0;
            p.grounded = true;
        }
    }

    camX = p.x - 200;

    // fail safe
    if(p.y > c.height + 200){
        p.x = 100;
        p.y = 100;
        p.vy = 0;
    }
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    // sky
    ctx.fillStyle="#6ec6ff";
    ctx.fillRect(0,0,c.width,c.height);

    // platforms
    ctx.fillStyle="green";
    for(let plat of platforms){
        ctx.fillRect(plat.x - camX, plat.y, plat.w, plat.h);
    }

    // player
    ctx.fillStyle="red";
    ctx.fillRect(p.x - camX, p.y, p.w, p.h);

    ui.innerHTML = "MGOT STABLE TEST";
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
